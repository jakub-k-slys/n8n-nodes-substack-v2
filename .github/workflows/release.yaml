name: Make a new release
on:
    schedule:
        - cron: '0 3 * * 1,3,6'
    workflow_dispatch:
permissions:
    id-token: write
    contents: read
jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write
        strategy:
            fail-fast: false
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}
                  token: ${{ secrets.N8N_NODES_SUBSTACK_V2_WRITE_TOKEN }}
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'pnpm'
            - name: Install
              run: pnpm install
            - name: set NODE_AUTH_TOKEN env
              run: echo "NODE_AUTH_TOKEN=${{ secrets.N8N_NODES_SUBSTACK_V2_NPM_TOKEN }}" >> $GITHUB_ENV
            - name: set NPM_TOKEN env
              run: echo "NPM_TOKEN=${{ secrets.N8N_NODES_SUBSTACK_V2_NPM_TOKEN }}" >> $GITHUB_ENV
            - name: Semantic Release
              uses: cycjimmy/semantic-release-action@v6
              id: semantic
              with:
                  tag_format: ${version}
                  extra_plugins: |
                      @semantic-release/changelog@6.0.0
                      @semantic-release/npm
                      @semantic-release/git
              env:
                  GITHUB_TOKEN: ${{ secrets.N8N_NODES_SUBSTACK_V2_WRITE_TOKEN }}
                  NPM_TOKEN: ${{ secrets.N8N_NODES_SUBSTACK_V2_NPM_TOKEN }}
